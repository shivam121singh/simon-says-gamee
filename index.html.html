<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height:100vh; 
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

        }
         .button1{
height:150px;
width:150px;
border:4px solid black;
border-radius:10px;
margin:5px;
background-color:pink;
         }
         .button2{
            
       height:150px;
width:150px;
border:4px solid black;
border-radius:10px;
margin:5px;
background-color:skyblue;
         }.button3{
height:150px;
width:150px;
border:4px solid black;
border-radius:10px;
margin:5px;
background-color:coral;
         }.button4{
height:150px;
width:150px;
border:4px solid black;
border-radius:10px;
margin:5px;
background-color:red;
         }
         .divone{
            display:flex;
         }
         .divtwo{
            display:flex;
         }
         .maindiv{
            display:flex;
            flex-direction:column;
         }
         h1{
            font-size:50px;
            color:darkorange;
            text-decoration:underline wavy
         }
         p{
            font-size:20px;
         }
         .btnflash{
            background-color:white;
         }
         .userpress{
            background-color:green;
         }
        .instructionvideo a {
          color:black;
          text-decoration:none;
      }
      .instructionvideo {
background-color:#fff3a3;
display:flex;
align-items:center;
justify-content:center;
margin-top:50px;
padding:10px;
border-radius:8px;
}
    </style>
</head>
<body>
    <h1>Simon says game</h1>
    <p>press any key to start the game
    <br> For mobile click anywhre to start the game </p>
    <div class="maindiv">
        <div class="divone">
<div class="button1 pink btn " id="pink">
    
</div>
<div class="button2 skyblue btn" id="skyblue">
    
</div>
        </div>
        <div class="divtwo">
<div class="button3 coral btn" id="coral">
    
</div>
<div class="button4 red btn" id="red">
    
</div>
        </div>
    </div>
    <div class="instructionvideo">
        <a href="https://www.youtube.com/watch?v=EWJ5uYwQJGU">CLICK ON ME FOR KNOWING THAT HOW TO PLAY THIS GAME</a>
    </div>
    <script>
let userseq = [];
let gameseq = [];
let level = 0;
let started = false;

let buttons = ["pink","skyblue","coral","red"];
document.addEventListener("keypress", startgame  );
document.addEventListener("click", startgame);

 function  startgame() {
    if (started == false) {
        started = true;
        console.log("game started");
        levelup();
    }
};
        

function btnflash(btn) {
    btn.classList.add("btnflash");
    setTimeout(function () {
        btn.classList.remove("btnflash");
    }, 300);
    
}

function userpress(btn) {
    btn.classList.add("userpress");
    setTimeout(function () {
        btn.classList.remove("userpress");
    }, 300);
     let wrongSound = new Audio("click.mp3");
        wrongSound.play();
}

function levelup() {
    userseq = [];

    let para = document.querySelector("p");
    level++;
    para.innerText = `Level ${level}`;

    let randomidx = Math.floor(Math.random() * 4);
    let randomcolor = buttons[randomidx];
    let randombtn = document.querySelector(`.${randomcolor}`);

    btnflash(randombtn);
    gameseq.push(randomcolor);
}

function buttonpress() {
    userpress(this);

    let userresponse = this.getAttribute("id");
    userseq.push(userresponse);

    anscheck(userseq.length - 1);
}

let allbuttons = document.querySelectorAll(".btn");

for (let btn of allbuttons) {
    btn.addEventListener("click", buttonpress);
}

function anscheck(idx) {

    if (userseq[idx] === gameseq[idx]) {

        if (userseq.length === gameseq.length) {
            setTimeout(levelup, 1000);
        }

    } else {

        //  Wrong button sound
        let wrongSound = new Audio("sound.mp3");
        wrongSound.play();

        let para = document.querySelector("p");
        para.innerText = `Game Over! Your score is ${level}. Press any key to start again`;

        let body = document.querySelector("body");
        body.style.backgroundColor = "red";

        setTimeout(function () {
            body.style.backgroundColor = "white";
        }, 300);

        // Reset game
        userseq = [];
        gameseq = [];
        level = 0;
        started = false;
    }
}
         
    </script>
</body>
</html>
